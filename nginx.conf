server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # 代理 WireMock Admin API
    location /__admin/ {
        proxy_pass http://host.docker.internal:8080/__admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 代理 WireMock mock 接口
    location /__wiremock-ui/ {
        proxy_pass http://host.docker.internal:8080/__wiremock-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 代理 Playground 请求（不需要 Vite 代理，直连 WireMock）
    location /test-mock/ {
        proxy_pass http://host.docker.internal:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
